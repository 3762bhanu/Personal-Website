{{ define "main" }}
{{ if eq .Section "blog" }}
<article class="blogpost container">
  <h1>{{ .Title }}</h1>
  <time>{{ .Date.Format "January 2, 2006" }}</time>
  <div class="post-content">
    {{ .Content }}
  </div>
  <hr class="endofpost">
</article>
{{ else }}
<section class="container">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</section>
{{ end }}
{{ end }}
