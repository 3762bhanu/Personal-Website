{{ define "main" }}
<section class="container list">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div>{{ . }}</div>{{ end }}
  <ul>
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <span>{{ .Date.Format "Jan 2, 2006" }}</span>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
